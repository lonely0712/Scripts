<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shadowrocket Modules</title>

  <link rel="stylesheet" href="index.css" />
</head>

<body>
  <h1>Shadowrocket Module Installer</h1>
  <p>Tap below to install directly in Shadowrocket</p>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search modules...">
  </div>

  <div class="module-list" id="moduleList"></div>

  <script>
    const isIOS = /iP(hone|od|ad)/i.test(navigator.userAgent);
    let allModules = [];

    function makeShadowrocketInstallUrl(rawUrl) {
      return "shadowrocket://install?module=" + encodeURIComponent(rawUrl);
    }

    function renderModules(modules) {
      const container = document.getElementById('moduleList');
      container.innerHTML = '';

      if (modules.length === 0) {
        container.textContent = 'No matching modules found.';
        return;
      }

      modules.forEach(mod => {
        const item = document.createElement('div');
        item.className = 'module-item';

        const title = document.createElement('span');
        title.className = 'module-title';
        title.textContent = mod.name;

        const link = document.createElement('a');
        link.className = 'install-button';

        const rawUrl =
          `https://raw.githubusercontent.com/lonely0712/Scripts/main/modules/${encodeURIComponent(mod.file)}`;

        if (isIOS) {
          link.href = makeShadowrocketInstallUrl(rawUrl);
          link.target = "_self";
        } else {
          link.href = rawUrl;
          link.download = mod.file;
          link.onclick = () =>
            alert('Open this page in Safari on iOS with Shadowrocket installed.');
        }

        link.textContent = 'Install';

        item.appendChild(title);
        item.appendChild(link);
        container.appendChild(item);
      });
    }

    fetch('./modules.json')
      .then(res => res.json())
      .then(modules => {
        allModules = modules;
        renderModules(modules);
      })
      .catch(() => {
        document.getElementById('moduleList').textContent = 'Failed to load modules.';
      });

    document.getElementById('searchInput').addEventListener('input', function () {
      const value = this.value.toLowerCase();

      const filtered = allModules.filter(mod =>
        mod.name.toLowerCase().includes(value)
      );

      renderModules(filtered);
    });
  </script>
</body>
</html>
